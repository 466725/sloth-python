name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'  # Run nightly at 2 AM UTC

jobs:
  smoke-test:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run smoke tests (unit + api)
        run: |
          python -m pytest -m "unit or api" --tb=short
      - name: Run Robot Framework smoke tests
        run: |
          python -m robot robot_demos/calculator/

  regression-test:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    services:
      selenium:
        image: selenium/standalone-chrome@sha256:18c17c7d95c29f21966ad6151c64aa1a3bf661c575a09f58d33c4bf2e5c66568
        ports:
          - 4444:4444
        options: --shm-size=2g
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Install Playwright browsers
        run: |
          playwright install
      - name: Run all pytest tests
        run: |
          python -m pytest --tb=short --maxfail=5 --ignore=pytest_demo/tests/ui/amazon_playwright --ignore=pytest_demo/tests/ui/amazon_selenium
        env:
          PW_HEADLESS: 1
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
      - name: Run all Robot Framework tests
        run: |
          python -m robot robot_demos/
      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
      - name: Generate Allure report
        if: always()
        run: |
          pip install allure-pytest
          allure generate temps/allure-results -o allure-report --clean
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            allure-report/
            log.html
            report.html
            output.xml