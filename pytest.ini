[pytest]

addopts = --alluredir=temps/allure-results --clean-alluredir

markers =
    ui: frontend test
    api: backend test
    unit: unit test
    ddt: data driven test
    debug: working in progress

log_file = temps/allure-results/log/pytest.log
log_file_level = info
log_file_format = %(asctime)s %(levelname)s %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
result_log_enable = 1
result_log_separator = 1
result_log_level_separator = warning
result_log_level_verbose = info